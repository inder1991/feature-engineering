apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: featuregen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - { name: POSTGRES_DB, value: featuregen }
            - { name: POSTGRES_USER, value: postgres }
            - { name: POSTGRES_PASSWORD, value: postgres }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "featuregen"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        # emptyDir: ephemeral local-dev storage (data resets if the pod is recreated).
        - { name: data, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: featuregen
spec:
  selector:
    app: postgres
  ports:
    - { port: 5432, targetPort: 5432 }
