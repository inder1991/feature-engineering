apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: featuregen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: featuregen-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: featuregen
spec:
  selector:
    app: frontend
  ports:
    - { port: 80, targetPort: 80 }
