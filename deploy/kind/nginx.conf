server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API surface -> backend service. Regex prefix match; the API_PATHS mirror frontend/vite.config.ts
    # plus /ingestion-runs (the run-manifest query surface). proxy_pass forwards client headers
    # (incl. the X-User / X-Roles auth-stub headers) by default.
    location ~ ^/(uploads|search|sources|columns|join-path|features|contract|contracts|graph|health|integrations|syncs|governance|gate|catalog|ingestion-runs)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }

    # SPA fallback for everything else.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
